kind = "web"
previewPath = "/"
title = "Reverse Proxy Detector"
version = "1.0.0"
id = "artifacts/recon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20550

[services.development]
run = "pnpm --filter @workspace/recon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/recon", "run", "build" ]
publicDir = "artifacts/recon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20550"
BASE_PATH = "/"
